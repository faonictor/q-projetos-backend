# Configuracoes do Banco de Dados MySQL - DESENVOLVIMENTO
spring.datasource.url=jdbc:mysql://localhost:3306/q_projetos?createDatabaseIfNotExist=true&useTimezone=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracoes do Hibernate/JPA - DESENVOLVIMENTO
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuracao da Porta do Servidor
server.port=8080

